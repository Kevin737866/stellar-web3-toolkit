name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo test --workspace --verbose
      - name: Build Soroban wasm (release)
        run: cargo build --workspace --exclude stellar-toolkit --target wasm32-unknown-unknown --release --verbose
