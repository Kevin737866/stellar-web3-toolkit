name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  merge_group:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check formatting and code style
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
        
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Check clippy lints
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          
      - name: Run Clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  # Build all targets
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - wasm32-unknown-unknown
          - x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          
      - name: Build
        run: cargo build --all --release --target ${{ matrix.target }}

  # Run tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          
      - name: Run tests
        run: cargo test --all --all-features -- --nocapture
        
      - name: Run doc tests
        run: cargo test --doc --all

  # Run network simulation tests
  simulation:
    name: Network Simulation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          
      - name: Run simulation tests
        run: |
          cargo test --package channel-simulator -- --nocapture
          
      - name: Run routing benchmarks
        run: |
          cargo test --package channel-router --test '*' -- --nocapture

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-audit
        run: cargo install cargo-audit || true
        
      - name: Run security audit
        run: cargo audit || echo "Audit complete"

  # Build WASM contracts
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: wasm-pack
          
      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/init/install.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
      - name: Build contracts
        run: |
          cargo build --package payment-channel-contract --target wasm32-unknown-unknown --release

  # Generate documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustdoc
          
      - name: Generate documentation
        run: cargo doc --all --no-deps
        continue-on-error: true
        
      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc/
          retention-days: 7

  # Merge queue check
  merge-check:
    name: Merge Queue Check
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.merge_group.base_sha }}
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          
      - name: Quick build check
        run: cargo build --all --quiet
        
      - name: Quick test check
        run: cargo test --all --quiet
