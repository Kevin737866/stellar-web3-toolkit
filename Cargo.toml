[package]
name = "stellar-web3-toolkit"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "A complete deployment pipeline for Soroban smart contracts on Stellar"
license = "MIT"
repository = "https://github.com/yourusername/stellar-web3-toolkit"
keywords = ["stellar", "soroban", "smart-contracts", "blockchain", "wasm"]
categories = ["command-line-utilities", "development-tools"]

[[bin]]
name = "stellar-toolkit"
path = "src/main.rs"

[dependencies]
# CLI framework
clap = { version = "4.4", features = ["derive", "env"] }
tokio = { version = "1.35", features = ["full"] }

# Soroban SDK
soroban-sdk = "20.0.0"
soroban-sdk-macros = "20.0.0"

# Stellar SDK
stellar-sdk = "0.24.0"
stellar-base = "0.3.2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# File system and utilities
dirs = "5.0"
walkdir = "2.4"
which = "4.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP client for Horizon API
reqwest = { version = "0.11", features = ["json"] }

# Cryptography
ed25519-dalek = "2.0"
sha2 = "0.10"

# Testing
mockall = "0.11"

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.0"

[features]
default = ["test-utils"]
test-utils = []

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
